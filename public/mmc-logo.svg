<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER MMC LOGO (approximation of real brand mark).
  REPLACE this file with the actual MMC logo asset provided by the brand.
  After replacing, also generate a PNG for the Word document letterhead:
    npx svgexport public/mmc-logo.svg public/mmc-logo.png 144:
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" role="img" aria-label="Mercurius Media Capital">
  <defs>
    <style>
      .mmc-purple { fill: #522A51; }
      .mmc-gold   { fill: #B59457; }
      .mmc-text   { fill: #3A3A3A; font-family: "Montserrat", Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Stylized "M" mark -->
  <g transform="translate(6,6)">
    <polygon class="mmc-purple" points="0,60 14,0 24,0 36,30 48,0 58,0 72,60 58,60 48,22 36,55 24,22 14,60" />
    <polygon class="mmc-gold" points="36,30 48,0 58,0 48,22" />
  </g>

  <!-- Wordmark -->
  <text x="96" y="32" class="mmc-text" font-size="13">MERCURIUS</text>
  <text x="96" y="52" class="mmc-text" font-size="13">MEDIA CAPITAL</text>
</svg>
